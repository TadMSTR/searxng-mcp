name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Coverage
        if: matrix.node-version == '22'
        run: pnpm coverage

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      # npmjs.org retired the audit endpoints `pnpm audit` depends on (410,
      # even on latest pnpm) — npm's own audit already speaks the new bulk
      # advisory endpoint, so generate a throwaway lockfile from package.json
      # and audit with that instead. See SXNG-15.
      - name: Generate npm lockfile for audit
        run: npm install --package-lock-only

      # Fail only on high+ advisories. A moderate, Windows-only serve-static
      # path-traversal in @hono/node-server <2.0.5 (GHSA-frvp-7c67-39w9) is
      # pulled in transitively by @modelcontextprotocol/sdk, which pins
      # ^1.19.9 — no patched version exists in range, and the vulnerable code
      # path isn't used (Linux deploy; node:http transport, not hono
      # serve-static). Revisit when the SDK bumps hono to 2.x. Tracked: vikunja#218.
      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high
